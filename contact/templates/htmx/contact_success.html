<!-- HTMX Swap Target Response -->
<div id="form-wrapper" class="p-8 mono text-sm leading-relaxed" x-data="{ visible: false }"
    x-init="setTimeout(() => visible = true, 100)">

    <div class="space-y-4 opacity-0 transition-opacity duration-500" :class="visible ? 'opacity-100' : ''">
        <div class="text-[var(--text-primary)]">
            <span class="text-[var(--accent-green)] mr-2">✓</span> Message sent successfully
        </div>
        <div class="text-[var(--text-primary)]">
            <span class="text-[var(--accent-green)] mr-2">✓</span> Email delivered to iaesdev@pm.me
        </div>
        <div class="text-[var(--text-primary)]">
            <span class="text-[var(--accent-green)] mr-2">✓</span> Response time: < 24h
        </div>

        <div class="mt-8 text-[var(--accent-cyan)] flex items-center">
            $ <span class="ml-2 animate-pulse bg-[var(--text-primary)] w-2 h-4 inline-block"></span>
        </div>

        <div class="mt-8 text-[var(--text-secondary)] text-[10px] uppercase tracking-widest">
            <a href="{% url 'home' %}" class="underline hover:text-white transition-colors">Return home</a> or <a
                href="{% url 'contact' %}" class="underline hover:text-white transition-colors">send another message</a>.
        </div>
    </div>

</div>
